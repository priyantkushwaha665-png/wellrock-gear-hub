<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | WellRock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b0e11; color: #fff; padding: 50px 0; }
        .admin-card { background-color: #1c2127; padding: 30px; border-radius: 15px; border: 1px solid #00ff41; margin-bottom: 30px; }
        .form-control { background-color: #0b0e11; border: 1px solid #333; color: #fff; margin-bottom: 10px; }
        .form-control:focus { background-color: #0b0e11; color: #fff; border-color: #00ff41; box-shadow: none; }
        .btn-add { background-color: #00ff41; color: #000; font-weight: bold; width: 100%; }
        .product-list { background-color: #1c2127; padding: 20px; border-radius: 15px; }
        .delete-link { color: #ff4b2b; text-decoration: none; font-weight: bold; }
        .delete-link:hover { color: #ff0000; }
    </style>
</head>
<body>

<div class="container">
    <div class="row">
        <!-- Form to Add Product -->
        <div class="col-md-5">
            <div class="admin-card">
                <h3 class="text-center mb-4" style="color: #00ff41;">Add Gear</h3>
                <form method="POST">
                    <input type="password" name="password" class="form-control" placeholder="Admin Password" required>
                    <input type="text" name="name" class="form-control" placeholder="Product Name" required>
                    <input type="text" name="price" class="form-control" placeholder="Price" required>
                    <input type="text" name="img" class="form-control" placeholder="Image URL" required>
                    <input type="text" name="affiliate_link" class="form-control" placeholder="Amazon Link" required>
                    <button type="submit" class="btn btn-add">Add Product</button>
                </form>
            </div>
        </div>

        <!-- List to Remove Product -->
        <div class="col-md-7">
            <div class="product-list">
                <h3 style="color: #00ff41;">Manage Inventory</h3>
                <table class="table table-dark mt-3">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for product in products %}
                        <tr>
                            <td>{{ product[1] }}</td>
                            <td><a href="/delete/{{ product[0] }}" class="delete-link" onclick="return confirm('Are you sure?')">Delete</a></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>
