<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WRX Admin | Manage Gear</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0b0e11; color: #fff; padding: 60px 0; }
        .admin-box { background: #1a1e23; padding: 30px; border-radius: 12px; border: 1px solid var(--gaming-green); max-width: 600px; margin: auto; }
        .form-control { background: #0b0e11; border: 1px solid #333; color: #fff; margin-bottom: 15px; }
        .btn-add { background: #00ff41; color: #000; font-weight: bold; width: 100%; border: none; padding: 12px; }
    </style>
</head>
<body>

<div class="container">
    {% if not logged_in %}
    <div class="admin-box text-center">
        <h2 style="color:#00ff41; font-family:'Orbitron';">ADMIN LOGIN</h2>
        <form method="POST">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
            <button type="submit" name="login_btn" class="btn btn-add">UNLOCK DASHBOARD</button>
        </form>
    </div>
    {% else %}
    <div class="admin-box">
        <div class="d-flex justify-content-between mb-4">
            <h3>Add New Gear</h3>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>
        <form method="POST">
            <input type="text" name="name" class="form-control" placeholder="Product Name" required>
            <input type="text" name="price" class="form-control" placeholder="Price (Ex: 12,500)" required>
            <input type="text" name="img" class="form-control" placeholder="Image URL (Postimg link)" required>
            <input type="text" name="affiliate_link" class="form-control" placeholder="Affiliate Link" required>
            <select name="category" class="form-control" required>
                <option value="Gaming Gear">Gaming Gear</option>
                <option value="Tech">Tech</option>
                <option value="Streaming">Streaming</option>
            </select>
            <select name="rating" class="form-control">
                <option value="5">5 Stars</option>
                <option value="4">4 Stars</option>
            </select>
            <textarea name="review" class="form-control" placeholder="Write your review here..." rows="3" required></textarea>
            <button type="submit" name="add_product" class="btn btn-add">PUBLISH TO STORE</button>
        </form>
    </div>
    {% endif %}
</div>

</body>
</html>
