<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WRX GearHub | Premium Gaming Reviews</title>
    
    <!-- Fonts & Bootstrap -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --gaming-green: #00ff41;
            --gaming-purple: #9d4edd;
            --dark-bg: #0b0e11;
        }

        body {
            margin: 0;
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), 
                        url('https://i.postimg.cc/rwTnVrLm/download.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        /* Navbar */
        .navbar {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 0;
        }

        .navbar-brand {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            color: #fff !important;
        }

        .navbar-brand span { color: var(--gaming-green); }

        /* Hero Section - Wahi Text jo sabse pehle diya tha */
        .hero-section {
            padding: 140px 0 60px 0;
        }

        .hero-title {
            font-weight: 900;
            font-size: clamp(2.5rem, 8vw, 5rem);
            line-height: 1.1;
            letter-spacing: -2px;
        }

        .text-green { color: var(--gaming-green); }
        .text-purple { color: var(--gaming-purple); }

        /* Product Cards */
        .card {
            background: rgba(20, 24, 28, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: 0.4s ease;
            height: 100%;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--gaming-green);
        }

        .img-box {
            background: #fff;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .img-box img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
        }

        .product-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            margin: 15px 0 5px 0;
        }

        /* Pricing */
        .price-container { margin-bottom: 20px; }
        .real-price {
            text-decoration: line-through;
            color: #666;
            font-size: 0.9rem;
            margin-right: 8px;
        }
        .discount-price {
            color: var(--gaming-green);
            font-size: 1.5rem;
            font-weight: 800;
        }

        /* Buttons */
        .btn-view {
            background: transparent;
            border: 1px solid var(--gaming-purple);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            padding: 10px;
            transition: 0.3s;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .btn-view:hover {
            background: var(--gaming-purple);
            color: #fff;
        }

        .btn-buy {
            background: var(--gaming-green);
            color: #000;
            font-weight: 800;
            padding: 12px;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            border-radius: 4px;
            display: block;
            text-align: center;
            transition: 0.3s;
        }

        .btn-buy:hover {
            background: #fff;
            transform: scale(1.02);
        }

        footer {
            padding: 60px 0;
            text-align: center;
            color: #444;
            font-size: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 50px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/"><span>⚡</span> WRX.GEARHUB</a>
        <div class="ms-auto">
            <a href="/admin" class="text-white text-decoration-none" style="font-size: 0.7rem; font-family: 'Orbitron'; opacity: 0.6;">👤 ADMIN</a>
        </div>
    </div>
</nav>

<!-- Hero Section with your original text -->
<section class="hero-section container">
    <h1 class="hero-title">
        Arena-grade gear. <br>
        <span class="text-green">Ruthlessly</span> reviewed. <br>
        <span class="text-purple">Always</span> linked.
    </h1>
</section>

<div class="container mb-5">
    <div class="row">
        {% for product in products %}
        <div class="col-lg-4 col-md-6 mb-4">
            <div class="card p-3">
                <div class="img-box">
                    <img src="{{ product[4] }}" alt="{{ product[1] }}">
                </div>
                <div class="card-body">
                    <h5 class="product-title">{{ product[1] }}</h5>
                    
                    <div class="price-container">
                        <span class="real-price">₹{{ product[2] }}</span>
                        <span class="discount-price">₹{{ product[3] }}</span>
                    </div>

                    <!-- Naye page ka link -->
                    <a href="/product/{{ product[0] }}" class="btn-view">VIEW REVIEWS & TAKE</a>
                    
                    <!-- Affiliate link -->
                    <a href="{{ product[5] }}" target="_blank" class="btn-buy">GRAB THE DEAL</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<footer>
    <p>&copy; 2026 WELLROCK27 | WRX GEARHUB | BUILT FOR THE COMMUNITY</p>
</footer>

</body>
</html>
