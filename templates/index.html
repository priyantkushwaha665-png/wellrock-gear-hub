<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WellRock Gear Hub | Great Deals</title>
    
    <!-- Emergent Style Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --gaming-green: #00ff41;
            --dark-bg: #0b0e11;
            --card-bg: rgba(21, 25, 29, 0.85);
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://chatgpt.com/backend-api/estuary/content?id=file_0000000022447208855a6abb34bdc720&ts=494089&p=fs&cid=1&sig=e9614de74cf4a6edd5eb2631252a10bb96fd7c21e54ffde06184bf15ebcb4619&v=0');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* Nav Style from Emergent vibe */
        .navbar {
            background: rgba(11, 14, 17, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 255, 65, 0.3);
            padding: 15px 0;
        }

        .brand-name {
            font-family: 'Orbitron', sans-serif;
            color: var(--gaming-green);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
            text-decoration: none;
        }

        /* The "Great Deals" Section */
        .promo-container {
            padding: 100px 0 50px 0;
            text-align: center;
        }

        .great-deals-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            color: var(--gaming-green);
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.6);
            margin-bottom: 10px;
            font-weight: 900;
        }

        .sub-text {
            font-family: 'JetBrains Mono', monospace;
            color: #aaa;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        /* Product Cards */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(8px);
            margin-bottom: 30px;
        }

        .card:hover {
            transform: translateY(-12px);
            border-color: var(--gaming-green);
            box-shadow: 0 10px 30px rgba(0, 255, 65, 0.15);
        }

        .card-img-container {
            background: #fff;
            padding: 25px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-img-top {
            max-height: 100%;
            width: auto;
            object-fit: contain;
        }

        .card-body {
            padding: 20px;
            text-align: center;
        }

        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 15px;
        }

        .price-tag {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--gaming-green);
            margin-bottom: 20px;
        }

        .buy-btn {
            background: var(--gaming-green);
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            padding: 12px;
            border-radius: 6px;
            text-decoration: none;
            display: block;
            transition: 0.3s;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
        }

        .buy-btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 15px #fff;
        }

        footer {
            padding: 40px 0;
            border-top: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

<nav class="navbar fixed-top">
    <div class="container d-flex justify-content-center">
        <a class="brand-name" href="#">WellRock Gear Hub</a>
    </div>
</nav>

<div class="promo-container">
    <div class="container">
        <h1 class="great-deals-text">GREAT DEALS</h1>
        <p class="sub-text">// PREMIUM GAMING GEAR FOR PRO STREAMERS</p>
    </div>
</div>

<div class="container mt-4">
    <div class="row">
        {% for product in products %}
        <div class="col-lg-4 col-md-6">
            <div class="card">
                <div class="card-img-container">
                    <img src="{{ product[3] }}" class="card-img-top" alt="{{ product[1] }}">
                </div>
                <div class="card-body">
                    <h5 class="card-title">{{ product[1] }}</h5>
                    <div class="price-tag">₹{{ product[2] }}</div>
                    <a href="{{ product[4] }}" target="_blank" class="buy-btn">Get Deal on Amazon</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<footer>
    <p>&copy; 2026 WELLROCK27 CREATIONS | ALL SYSTEM NOMINAL</p>
</footer>

</body>
</html>
