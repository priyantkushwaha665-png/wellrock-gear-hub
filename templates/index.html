<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WellRock Gear Hub | Great Deals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { 
            /* Background Image Setup */
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://chatgpt.com/backend-api/estuary/content?id=file_0000000022447208855a6abb34bdc720&ts=494089&p=fs&cid=1&sig=e9614de74cf4a6edd5eb2631252a10bb96fd7c21e54ffde06184bf15ebcb4619&v=0');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
        }
        .navbar { background-color: rgba(21, 25, 29, 0.9); border-bottom: 2px solid #00ff41; }
        .brand-name { font-family: 'Orbitron', sans-serif; color: #00ff41; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Great Deals Header Style */
        .promo-header {
            font-family: 'Orbitron', sans-serif;
            color: #00ff41;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
            margin-top: 20px;
            font-weight: bold;
            letter-spacing: 5px;
        }

        .hero-section { padding: 80px 0; text-align: center; }
        .card { 
            background-color: rgba(28, 33, 39, 0.9); 
            border: 1px solid #333; 
            transition: 0.3s; 
            margin-bottom: 30px; 
            border-radius: 15px; 
            overflow: hidden;
            backdrop-filter: blur(5px);
        }
        .card:hover { transform: translateY(-10px); border-color: #00ff41; box-shadow: 0 0 20px rgba(0, 255, 65, 0.3); }
        .card-img-top { height: 200px; object-fit: contain; padding: 20px; background: #fff; }
        .card-title { font-family: 'Orbitron', sans-serif; color: #00ff41; font-size: 1.1rem; }
        .price-tag { font-size: 1.3rem; font-weight: bold; }
        .buy-btn { 
            background-color: #00ff41; 
            color: #000; 
            font-weight: bold; 
            width: 100%; 
            padding: 10px; 
            border-radius: 5px; 
            text-decoration: none; 
            display: inline-block; 
            text-align: center;
        }
        .buy-btn:hover { background-color: #00cc33; color: #000; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container text-center">
        <a class="navbar-brand brand-name w-100" href="#">WellRock Gear Hub</a>
    </div>
</nav>

<div class="hero-section">
    <h2 class="promo-header">GREAT DEALS</h2>
    <p class="text-uppercase" style="letter-spacing: 2px;">Handpicked Gaming Setup Essentials</p>
</div>

<div class="container mt-4">
    <div class="row">
        {% for product in products %}
        <div class="col-md-4 col-sm-6">
            <div class="card">
                <img src="{{ product[3] }}" class="card-img-top" alt="{{ product[1] }}">
                <div class="card-body text-center">
                    <h5 class="card-title">{{ product[1] }}</h5>
                    <p class="price-tag">₹{{ product[2] }}</p>
                    <a href="{{ product[4] }}" target="_blank" class="buy-btn">Buy on Amazon</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<footer class="text-center py-5 mt-5">
    <p>&copy; 2026 WellRock Gear Hub | Level Up Your Game</p>
</footer>

</body>
</html>
