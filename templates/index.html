<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WellRock Gear Hub | Great Deals</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --gaming-green: #00ff41;
            --dark-bg: #0b0e11;
            --card-bg: rgba(21, 25, 29, 0.9);
        }

        body {
            margin: 0;
            padding: 0;
            /* Aapka bheja hua image link yahan laga diya hai */
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://i.postimg.cc/rwTnVrLm/download.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(11, 14, 17, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 255, 65, 0.3);
            padding: 15px 0;
        }

        .brand-name {
            font-family: 'Orbitron', sans-serif;
            color: var(--gaming-green);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
            text-decoration: none;
        }

        .promo-container {
            padding: 120px 0 60px 0;
            text-align: center;
        }

        .great-deals-text {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 10vw, 5rem); /* Responsive size */
            color: var(--gaming-green);
            text-shadow: 0 0 30px rgba(0, 255, 65, 0.8);
            margin-bottom: 10px;
            font-weight: 900;
            letter-spacing: 10px;
        }

        .sub-text {
            font-family: 'JetBrains Mono', monospace;
            color: #aaa;
            letter-spacing: 3px;
            font-size: 1rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.4s ease;
            backdrop-filter: blur(12px);
            margin-bottom: 30px;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--gaming-green);
            box-shadow: 0 15px 40px rgba(0, 255, 65, 0.2);
        }

        .card-img-container {
            background: #fff;
            padding: 20px;
            height: 230px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-img-top {
            max-height: 100%;
            width: auto;
            object-fit: contain;
        }

        .card-body {
            padding: 25px;
            text-align: center;
        }

        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 15px;
        }

        .price-tag {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--gaming-green);
            margin-bottom: 25px;
        }

        .buy-btn {
            background: var(--gaming-green);
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            padding: 14px;
            border-radius: 8px;
            text-decoration: none;
            display: block;
            transition: 0.3s;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        .buy-btn:hover {
            background: #fff;
            box-shadow: 0 0 20px #fff;
            color: #000;
        }

        footer {
            padding: 60px 0;
            color: #555;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>

<nav class="navbar fixed-top">
    <div class="container d-flex justify-content-center">
        <a class="brand-name" href="#">WellRock Gear Hub</a>
    </div>
</nav>

<div class="promo-container">
    <div class="container">
        <h1 class="great-deals-text">GREAT DEALS</h1>
        <p class="sub-text">// EXCLUSIVE GEAR FOR THE COMMUNITY</p>
    </div>
</div>

<div class="container mt-4">
    <div class="row">
        {% for product in products %}
        <div class="col-lg-4 col-md-6">
            <div class="card">
                <div class="card-img-container">
                    <img src="{{ product[3] }}" class="card-img-top" alt="{{ product[1] }}">
                </div>
                <div class="card-body">
                    <h5 class="card-title">{{ product[1] }}</h5>
                    <div class="price-tag">₹{{ product[2] }}</div>
                    <a href="{{ product[4] }}" target="_blank" class="buy-btn">Grab Deal</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<footer>
    <p>&copy; 2026 WELLROCK GEAR HUB | CREATED BY A STREAMER FOR STREAMERS</p>
</footer>

</body>
</html>
