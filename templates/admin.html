<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | WRX GearHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b0e11; color: #fff; font-family: 'Inter', sans-serif; padding: 50px 0; }
        .admin-card { background: #1c2127; padding: 30px; border-radius: 15px; border: 1px solid #00ff41; max-width: 500px; margin: auto; }
        .form-control { background: #0b0e11; border: 1px solid #333; color: #fff; margin-bottom: 15px; }
        .form-control:focus { border-color: #00ff41; color: #fff; background: #0b0e11; box-shadow: none; }
        .btn-primary { background: #00ff41; border: none; color: #000; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    {% if not logged_in %}
    <!-- Login Box -->
    <div class="admin-card">
        <h2 class="text-center mb-4" style="color: #00ff41; font-family: 'Orbitron';">Admin Login</h2>
        <form method="POST">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
            <button type="submit" name="login_btn" class="btn btn-primary">Login to Dashboard</button>
        </form>
    </div>
    {% else %}
    <!-- Admin Dashboard -->
    <div class="d-flex justify-content-between mb-4">
        <h2 style="color: #00ff41;">Admin Dashboard</h2>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>

    <div class="row">
        <div class="col-md-5">
            <div class="admin-card mb-4" style="max-width: 100%;">
                <h4>Add New Product</h4>
                <form method="POST">
                    <input type="text" name="name" class="form-control" placeholder="Product Name" required>
                    <input type="text" name="price" class="form-control" placeholder="Price (e.g. 14,999)" required>
                    <input type="text" name="img" class="form-control" placeholder="Image URL" required>
                    <input type="text" name="affiliate_link" class="form-control" placeholder="Amazon Link" required>
                    <select name="category" class="form-control" required>
                        <option value="">Select Category</option>
                        <option value="Gaming Gear">Gaming Gear</option>
                        <option value="Tech">Tech</option>
                        <option value="Streaming">Streaming</option>
                        <option value="Deals">Deals</option>
                    </select>
                    <button type="submit" name="add_product" class="btn btn-primary">Add Product</button>
                </form>
            </div>
        </div>
        <div class="col-md-7">
            <div class="admin-card" style="max-width: 100%;">
                <h4>Current Inventory</h4>
                <table class="table table-dark">
                    <thead><tr><th>Name</th><th>Category</th><th>Action</th></tr></thead>
                    <tbody>
                        {% for product in products %}
                        <tr>
                            <td>{{ product[1] }}</td>
                            <td>{{ product[5] }}</td>
                            <td><a href="/delete/{{ product[0] }}" class="text-danger" onclick="return confirm('Delete karein?')">Delete</a></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    {% endif %}
</div>

</body>
</html>
