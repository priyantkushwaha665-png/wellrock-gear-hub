<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin | WRX GearHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0b0e11; color: #fff; padding-top: 50px; }
        .admin-box { background: #1a1e23; padding: 30px; border-radius: 12px; border: 1px solid #00ff41; max-width: 600px; margin: auto; }
        .form-control, .form-select { background: #0b0e11; border: 1px solid #333; color: #fff; margin-bottom: 12px; }
        .btn-add { background: #00ff41; color: #000; font-weight: 900; width: 100%; border: none; padding: 12px; }
    </style>
</head>
<body>
<div class="container">
    {% if not logged_in %}
    <div class="admin-box text-center">
        <h2 style="font-family:'Orbitron'; color:#00ff41;">ADMIN LOGIN</h2>
        <form method="POST">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
            <button type="submit" name="login_btn" class="btn btn-add">LOGIN</button>
        </form>
    </div>
    {% else %}
    <div class="admin-box">
        <div class="d-flex justify-content-between mb-4">
            <h4>Add New Product</h4>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
        <form method="POST">
            <input type="text" name="name" class="form-control" placeholder="Product Name" required>
            <div class="row">
                <div class="col"><input type="text" name="real_price" class="form-control" placeholder="Real Price (MRP)" required></div>
                <div class="col"><input type="text" name="discount_price" class="form-control" placeholder="Sale Price" required></div>
            </div>
            <input type="text" name="img" class="form-control" placeholder="Image URL" required>
            <input type="text" name="affiliate_link" class="form-control" placeholder="Affiliate Link" required>
            
            <select name="category" class="form-select" required>
                <option value="Gaming Gear">Gaming Gear</option>
                <option value="Tech">Tech</option>
                <option value="Streaming">Streaming</option>
            </select>

            <label>Rating (1-5):</label>
            <select name="rating" class="form-select">
                <option value="1">1 Star</option>
                <option value="2">2 Stars</option>
                <option value="3">3 Stars</option>
                <option value="4">4 Stars</option>
                <option value="5" selected>5 Stars</option>
            </select>

            <textarea name="review" class="form-control" placeholder="WellRock's Review..." rows="3" required></textarea>
            <button type="submit" name="add_product" class="btn btn-add">PUBLISH GEAR</button>
        </form>
    </div>
    {% endif %}
</div>
</body>
</html>
