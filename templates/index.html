<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WellRock Gear Hub | Premium Gaming Gear</title>
    <!-- Bootstrap CSS for Modern Design -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b0b0b; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: #161616; border-bottom: 1px solid #333; }
        .hero-section { padding: 80px 0; text-align: center; background: radial-gradient(circle, #1a1a1a 0%, #0b0b0b 100%); }
        .card { background: #1a1a1a; border: 1px solid #333; transition: 0.4s; color: white; border-radius: 15px; overflow: hidden; }
        .card:hover { transform: translateY(-10px); border-color: #0d6efd; box-shadow: 0 0 20px rgba(13, 110, 253, 0.3); }
        .card-img-top { height: 220px; object-fit: cover; filter: brightness(0.9); }
        .price-tag { color: #00ff88; font-size: 1.4rem; font-weight: 700; }
        .category-badge { background: #0d6efd; font-size: 0.7rem; padding: 4px 12px; border-radius: 50px; text-transform: uppercase; margin-bottom: 10px; display: inline-block; }
        .footer { background: #161616; padding: 30px 0; margin-top: 50px; color: #666; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">WELLROCK <span class="text-primary">GEAR HUB</span></a>
  </div>
</nav>

<div class="hero-section">
    <h1 class="display-3 fw-bold">LEVEL UP YOUR SETUP</h1>
    <p class="lead text-secondary">The Best Peripherals for Pro Streamers & Gamers</p>
</div>

<div class="container my-5">
    <div class="row g-4">
        {% for item in products %}
        <div class="col-lg-4 col-md-6">
            <div class="card h-100">
                <img src="{{ item[3] }}" class="card-img-top" alt="Product Image">
                <div class="card-body">
                    <span class="category-badge">{{ item[4] }}</span>
                    <h4 class="card-title">{{ item[1] }}</h4>
                    <p class="price-tag mb-3">{{ item[2] }}</p>
                    <a href="#" class="btn btn-primary w-100 fw-bold">View Product</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<footer class="footer text-center">
    <p>&copy; 2026 WellRock Gaming | Created for the Community</p>
</footer>

</body>
</html>
