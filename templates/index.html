<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WellRock Gear Hub | Gaming Setup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0e11; color: #ffffff; font-family: 'Inter', sans-serif; }
        .navbar { background-color: #15191d; border-bottom: 2px solid #00ff41; }
        .brand-name { font-family: 'Orbitron', sans-serif; color: #00ff41; text-transform: uppercase; letter-spacing: 2px; }
        .hero-section { padding: 60px 0; text-align: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1542751371-adc38448a05e?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80'); background-size: cover; border-bottom: 1px solid #333; }
        .card { background-color: #1c2127; border: 1px solid #333; transition: 0.3s; margin-bottom: 30px; border-radius: 15px; overflow: hidden; }
        .card:hover { transform: translateY(-10px); border-color: #00ff41; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); }
        .card-img-top { height: 200px; object-fit: contain; padding: 20px; background: #fff; }
        .card-title { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: #00ff41; }
        .price-tag { font-size: 1.3rem; font-weight: bold; color: #fff; }
        .buy-btn { background-color: #00ff41; color: #000; font-weight: bold; border: none; width: 100%; padding: 10px; border-radius: 5px; text-decoration: none; display: inline-block; text-align: center; }
        .buy-btn:hover { background-color: #00cc33; color: #000; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand brand-name" href="#">WellRock Gear Hub</a>
    </div>
</nav>

<div class="hero-section">
    <h1 class="brand-name" style="font-size: 3rem;">Level Up Your Game</h1>
    <p>Best Gaming Peripherals Handpicked by WellRock</p>
</div>

<div class="container mt-5">
    <div class="row">
        {% for product in products %}
        <div class="col-md-4 col-sm-6">
            <div class="card">
                <img src="{{ product[3] }}" class="card-img-top" alt="{{ product[1] }}">
                <div class="card-body text-center">
                    <h5 class="card-title">{{ product[1] }}</h5>
                    <p class="price-tag">₹{{ product[2] }}</p>
                    <a href="{{ product[4] }}" target="_blank" class="buy-btn">Buy on Amazon</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<footer class="text-center py-4 mt-5" style="border-top: 1px solid #333;">
    <p>&copy; 2026 WellRock Gear Hub. All Rights Reserved.</p>
</footer>

</body>
</html>
