<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | WellRock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b0e11; color: #fff; padding-top: 50px; }
        .admin-card { background-color: #1c2127; padding: 30px; border-radius: 15px; border: 1px solid #00ff41; max-width: 500px; margin: auto; }
        .form-control { background-color: #0b0e11; border: 1px solid #333; color: #fff; margin-bottom: 15px; }
        .form-control:focus { background-color: #0b0e11; color: #fff; border-color: #00ff41; box-shadow: none; }
        .btn-add { background-color: #00ff41; color: #000; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="admin-card">
        <h2 class="text-center mb-4" style="font-family: 'Orbitron'; color: #00ff41;">Add New Gear</h2>
        <form method="POST">
            <input type="password" name="password" class="form-control" placeholder="Admin Password" required>
            <hr style="border-color: #333;">
            <input type="text" name="name" class="form-control" placeholder="Product Name (e.g. Mouse)" required>
            <input type="text" name="price" class="form-control" placeholder="Price (e.g. 5,999)" required>
            <input type="text" name="img" class="form-control" placeholder="Image URL" required>
            <input type="text" name="affiliate_link" class="form-control" placeholder="Amazon Affiliate Link" required>
            <button type="submit" class="btn btn-add">Add to Store</button>
        </form>
    </div>
</div>

</body>
</html>
