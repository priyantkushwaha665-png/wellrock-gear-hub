<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ product[1] }} | Review</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0b0e11; color: white; padding: 40px 0; font-family: 'Inter', sans-serif; }
        .detail-card { background: #161a1e; border: 1px solid #333; border-radius: 20px; padding: 40px; max-width: 800px; margin: auto; }
        .wellrock-take { background: rgba(157, 78, 221, 0.1); border-left: 5px solid #9d4edd; padding: 20px; border-radius: 10px; margin: 25px 0; }
        .review-item { background: #0b0e11; border: 1px solid #222; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .form-control { background: #0b0e11; border: 1px solid #444; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="detail-card">
            <a href="/" style="color: #00ff41; text-decoration: none;">← Back to Hub</a>
            <div class="text-center mt-4">
                <img src="{{ product[4] }}" style="max-height: 250px; background: white; padding: 15px; border-radius: 15px;">
                <h1 class="mt-3">{{ product[1] }}</h1>
                <div class="h2 text-success">₹{{ product[3] }}</div>
            </div>
            <div class="wellrock-take">
                <h5 style="color: #9d4edd; font-weight: bold;">WELLROCK'S TAKE:</h5>
                <p>"{{ product[7] }}"</p>
                <div style="color: #ffcc00;">Rating: {{ product[8] }}/5 ★</div>
            </div>
            <hr>
            <h4>Community Reviews</h4>
            {% for r in reviews %}
            <div class="review-item">
                <strong style="color: #00ff41;">{{ r[2] }}</strong>
                <p class="mb-0 text-secondary">{{ r[3] }}</p>
            </div>
            {% endfor %}
            <form action="/submit_review" method="POST" class="mt-4">
                <input type="hidden" name="product_id" value="{{ product[0] }}">
                <input type="text" name="user_name" class="form-control mb-2" placeholder="Your Name" required>
                <textarea name="user_text" class="form-control mb-2" placeholder="Write review..." required></textarea>
                <button type="submit" class="btn btn-success w-100">POST REVIEW</button>
            </form>
        </div>
    </div>
</body>
</html>
