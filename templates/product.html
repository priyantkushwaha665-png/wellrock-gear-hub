<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ product[1] }} | Reviews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0b0e11; color: white; padding: 40px 0; }
        .detail-card { background: #161a1e; border: 1px solid #333; border-radius: 20px; padding: 40px; max-width: 800px; margin: auto; }
        .wellrock-take { background: rgba(157, 78, 221, 0.1); border-left: 5px solid #9d4edd; padding: 20px; border-radius: 10px; margin: 25px 0; }
        .review-item { background: #0b0e11; border: 1px solid #222; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .form-control { background: #0b0e11; border: 1px solid #444; color: white; }
        .form-control:focus { background: #0b0e11; border-color: #00ff41; color: white; box-shadow: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="detail-card">
            <a href="/" class="text-decoration-none" style="color: #00ff41;">← Back to Hub</a>
            
            <div class="text-center mt-4">
                <img src="{{ product[4] }}" style="max-height: 300px; background: white; padding: 20px; border-radius: 15px;">
                <h1 class="mt-4">{{ product[1] }}</h1>
                <p class="badge bg-success">{{ product[6] }}</p>
                <div class="h2 text-success">₹{{ product[3] }}</div>
            </div>

            <!-- WELLROCK'S OFFICIAL REVIEW -->
            <div class="wellrock-take">
                <h5 style="color: #9d4edd; font-weight: bold;">WELLROCK'S TAKE:</h5>
                <p class="fst-italic" style="font-size: 1.1rem;">"{{ product[7] }}"</p>
                <div style="color: #ffcc00;">Rating: {% for i in range(product[8]) %}★{% endfor %}</div>
            </div>

            <hr style="border-color: #444;">

            <!-- COMMUNITY REVIEWS -->
            <h4 class="mb-4">Community Feedback</h4>
            {% for r in reviews %}
            <div class="review-item">
                <strong style="color: #00ff41;">{{ r[2] }}</strong>
                <p class="mb-0 text-secondary">{{ r[3] }}</p>
            </div>
            {% else %}
            <p class="text-muted">No reviews yet. Be the first!</p>
            {% endfor %}

            <!-- ADD REVIEW FORM -->
            <div class="mt-5 p-4" style="background: rgba(255,255,255,0.03); border-radius: 15px;">
                <h5>Write a Review</h5>
                <form action="/submit_review" method="POST">
                    <input type="hidden" name="product_id" value="{{ product[0] }}">
                    <div class="mb-3">
                        <input type="text" name="user_name" class="form-control" placeholder="Your Name" required>
                    </div>
                    <div class="mb-3">
                        <textarea name="user_text" class="form-control" rows="3" placeholder="What do you think about this gear?" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold">POST REVIEW</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
